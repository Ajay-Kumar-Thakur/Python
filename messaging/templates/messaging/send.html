<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Message | Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .logo-circle {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px rgba(79,70,229,0.3);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1.8rem;
        }

        /* ── Toggle ── */
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            background: #f9fafb;
            border-radius: 14px;
            padding: 0.85rem 1.1rem;
            border: 1.5px solid var(--border-color);
            cursor: pointer;
        }

        .toggle-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            flex: 1;
            text-align: left;
        }

        .toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #d1d5db;
            border-radius: 24px;
            transition: 0.3s;
        }

        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider { background: var(--primary-color); }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }

        /* ── Form Groups ── */
        .form-group {
            text-align: left;
            margin-bottom: 1.4rem;
        }

        label.field-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: var(--text-main);
        }

        label.field-label i { color: var(--primary-color); }

        /* ── Phone row (flag + code + input) ── */
        .phone-row {
            display: flex;
            align-items: center;
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
            background: #fafafa;
            transition: all 0.3s;
        }

        .phone-row:focus-within {
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
        }

        .country-prefix {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px;
            border-right: 1.5px solid var(--border-color);
            height: 100%;
            min-height: 50px;
            white-space: nowrap;
            font-size: 0.88rem;
            font-weight: 600;
            color: #374151;
            background: #f3f4f6;
            flex-shrink: 0;
        }

        .flag { font-size: 1.3rem; }

        .phone-row input[type="text"] {
            flex: 1;
            border: none;
            outline: none;
            padding: 0.85rem 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            color: #374151;
            background: transparent;
        }

        /* ── Textarea ── */
        .textarea-wrapper { position: relative; }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 1rem 1rem 1rem 2.8rem;
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.92rem;
            color: #374151;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s;
            background: #fafafa;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
        }

        .input-icon {
            position: absolute;
            top: 1.05rem; left: 1.05rem;
            color: #9ca3af;
            font-size: 1rem;
        }

        /* ── Button ── */
        button[type="submit"] {
            width: 100%;
            background: var(--primary-color);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button[type="submit"]:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79,70,229,0.35);
        }

        .helper-text {
            font-size: 0.73rem;
            color: var(--text-muted);
            margin-top: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        #phone-field { display: block; }
        #phone-field.hidden { display: none; }
    </style>
</head>
<body>

<div class="card">

    <div class="logo-circle">
        <i class="fas fa-paper-plane"></i>
    </div>

    <h2>Bulk messaging</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Bulk toggle -->
        <div class="toggle-group">
            <span class="toggle-label">
                <i class="fas fa-users" style="color:var(--primary-color);margin-right:6px;"></i>
                Send to all contacts (Bulk)
            </span>
            <label class="toggle-switch">
                <input type="checkbox" id="bulk-toggle" name="send_bulk" value="1">
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- Phone field with Nepal flag + country code -->
        <div class="form-group" id="phone-field">
            <label class="field-label" for="phone">
                <i class="fas fa-phone"></i> Phone Number
            </label>

            <div class="phone-row">
                <!-- Nepal flag + +977 prefix (non-editable) -->
                <div class="country-prefix">
                    <span class="flag">🇳🇵</span>
                    <span>+977</span>
                </div>
                <!-- User types only the local number -->
                <input
                    type="text"
                    id="phone"
                    name="phone_local"
                    placeholder="98XXXXXXXX"
                    maxlength="10"
                    inputmode="numeric"
                    pattern="[0-9]{7,10}"
                />
            </div>
        </div>

        <!-- Message -->
        <div class="form-group">
            <label class="field-label" for="message">
                <i class="fas fa-pen-nib"></i> Compose Message
            </label>
            <div class="textarea-wrapper">
                <i class="fas fa-comment-dots input-icon"></i>
                <textarea
                    id="message"
                    name="message"
                    placeholder="Type your announcement here..."
                    required></textarea>
            </div>
            <p class="helper-text">
                <i class="fas fa-shield-halved"></i>
                Sent securely to all verified recipients.
            </p>
        </div>

        <button type="submit">
            <span>Send Message</span>
            <i class="fas fa-arrow-right"></i>
        </button>

    </form>
</div>

<script>
    const toggle = document.getElementById('bulk-toggle');
    const phoneField = document.getElementById('phone-field');
    const phoneInput = document.getElementById('phone');

    toggle.addEventListener('change', function () {
        if (this.checked) {
            phoneField.classList.add('hidden');
            phoneInput.removeAttribute('required');
        } else {
            phoneField.classList.remove('hidden');
            phoneInput.setAttribute('required', 'required');
        }
    });

    // Only allow digits in the phone field
    phoneInput.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '');
    });
</script>

</body>
</html>
