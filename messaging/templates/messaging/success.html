<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Message Success</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f1f1f1; /* Background color of your app */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Full screen overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* The Alert Box (Match Image) */
        .alert-card {
            background: white;
            width: 450px;
            padding: 40px 20px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: showModal 0.3s ease-out;
        }

        @keyframes showModal {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* The Custom Green Checkmark */
        .icon-box {
            width: 80px;
            height: 80px;
            border: 4px solid #A5DC86; /* Light green border */
            border-radius: 50%;
            margin: 0 auto 25px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkmark-stem {
            position: absolute;
            width: 4px;
            height: 40px;
            background-color: #A5DC86;
            left: 46px;
            top: 18px;
            transform: rotate(45deg);
        }

        .checkmark-kick {
            position: absolute;
            width: 20px;
            height: 4px;
            background-color: #A5DC86;
            left: 24px;
            top: 46px;
            transform: rotate(45deg);
        }

        /* Typography */
        h2 {
            color: #595959; /* Dark grey title */
            font-size: 30px;
            font-weight: 600;
            margin: 0 0 15px 0;
        }

        p {
            color: #797979; /* Lighter grey text */
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* Blue OK Button */
        .ok-button {
            background-color: #8CD4F5; /* Specific light blue from image */
            color: white;
            text-decoration: none;
            padding: 10px 35px;
            font-size: 17px;
            font-weight: 500;
            border-radius: 5px;
            display: inline-block;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }

        .ok-button:hover {
            background-color: #7ecff4;
        }

        .ok-button:active {
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- The Popup -->
    <div class="modal-overlay">
        <div class="alert-card">
            
            <!-- Custom Success Icon -->
            <div class="icon-box">
                <div class="checkmark-kick"></div>
                <div class="checkmark-stem"></div>
            </div>
           {% if partial_success %}
  <p style="color: orange;">Message sent, but some numbers failed:</p>
  <ul>
    {% for err in errors %}
      <li>{{ err.phone }}: {{ err.error }}</li>
    {% endfor %}
  </ul>
{% else %}
  <p>All messages sent successfully!</p>
{% endif %}
            
            <!-- The OK Button -->
            <a href="/" class="ok-button">OK</a>

        </div>
    </div>

</body>
</html>
